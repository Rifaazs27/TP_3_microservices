# alert_rules.yml — Règles d'alerte Prometheus
# À placer à la racine du projet

groups:
  - name: services.rules
    rules:

      # ── Alerte 1 : Taux d'erreur élevé ─────────────────────
      # Se déclenche si plus de 5% des requêtes retournent une erreur 5xx
      # pendant 2 minutes consécutives
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"4..|5.."}[5m])) by (job)
            /
            sum(rate(http_requests_total[5m])) by (job)
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreur > 5% sur {{ $labels.job }}"
          description: >
            Le service {{ $labels.job }} a un taux d'erreur de {{ $value | humanizePercentage }}.
            Vérifiez les logs avec : docker-compose logs {{ $labels.job }}

      # ── Alerte 2 : Latence p99 élevée ──────────────────────
      # Se déclenche si le 99ème percentile de latence dépasse 500ms
      # pendant 5 minutes consécutives
      - alert: HighLatencyP99
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_duration_seconds_bucket[5m])) by (le, job)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence p99 > 500ms sur {{ $labels.job }}"
          description: >
            Le service {{ $labels.job }} répond en {{ $value | humanizeDuration }} au p99.

      # ── Alerte 3 : Service down ─────────────────────────────
      # Se déclenche si Prometheus ne peut pas scraper un service
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} injoignable"
          description: "Prometheus ne peut pas collecter les métriques de {{ $labels.job }} depuis 1 minute."

      # ── Alerte 4 : Mémoire élevée ───────────────────────────
      # Se déclenche si un processus Node.js utilise plus de 200MB
      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes > 200 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Utilisation mémoire élevée sur {{ $labels.job }}"
          description: "{{ $labels.job }} utilise {{ $value | humanize }} de RAM."
