version: '3.8'

services:
  # ── Microservice 1: Kanboard ────────────────────────────────
  kanboard:
    image: kanboard/kanboard:latest
    container_name: kanboard_app
    ports:
      - "8080:80"
    environment:
      - DATABASE_URL=mysql://kanboarduser:kanboardpass@db-kanboard/kanboard
    depends_on:
      db-kanboard:
        condition: service_healthy
    networks:
      - tp-network

  # ── Base de données Kanboard ────────────────────────────────
  db-kanboard:
    image: mariadb:10.11
    container_name: kanboard_db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=kanboard
      - MYSQL_USER=kanboarduser
      - MYSQL_PASSWORD=kanboardpass
    networks:
      - tp-network
    healthcheck:
      test: ["CMD","healthcheck.sh","--connect","--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Microservice 2: API RH ──────────────────────────────────
  api-rh:
    build: ./api-rh
    container_name: api_rh
    ports:
      - "3000:3000"
    networks:
      - tp-network
    healthcheck:
      test: ["CMD","node","-e","require('http').get('http://localhost:3000/health',(r)=>{if(r.statusCode!==200)process.exit(1)})"]
      interval: 10s

  # ── Microservice 3: Python Processor ────────────────────────
  data-processor:
    build: ./service-python
    container_name: python_processor
    ports:
      - "5000:5000"
    networks:
      - tp-network

  # ── Prometheus — Collecte des métriques ──────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - tp-network
    restart: unless-stopped

  # ── Grafana — Dashboards ─────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=devops2024
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - tp-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Alertmanager — Routage des alertes ──────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - tp-network
    restart: unless-stopped

# ── Réseaux et Volumes ────────────────────────────────────────
networks:
  tp-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
