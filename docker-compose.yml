version: '3.8'

services:
  # ── Microservice 1: Kanboard ────────────────────────────────
  kanboard:
    image: kanboard/kanboard:latest
    container_name: kanboard_app
    ports:
      - "8080:80"
    environment:
      - DATABASE_URL=mysql://kanboarduser:kanboardpass@db-kanboard/kanboard
    depends_on:
      db-kanboard:
        condition: service_healthy
    networks:
      - tp-network

  # ── Base de données Kanboard ────────────────────────────────
  db-kanboard:
    image: mariadb:10.11
    container_name: kanboard_db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=kanboard
      - MYSQL_USER=kanboarduser
      - MYSQL_PASSWORD=kanboardpass
    networks:
      - tp-network
    healthcheck:
      test: ["CMD","healthcheck.sh","--connect","--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Microservice 2: API RH (Node.js) ────────────────────────
  api-rh:
    build: ./api-rh
    container_name: api_rh
    ports:
      - "3000:3000"
    environment:
      - SERVICE_NAME=api-rh
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    networks:
      - tp-network
    healthcheck:
      test: ["CMD","node","-e","require('http').get('http://localhost:3000/health',(r)=>{if(r.statusCode!==200)process.exit(1)})"]
      interval: 10s

  # ── Microservice 3: Python Processor (Flask) ────────────────
  data-processor:
    build: ./service-python
    container_name: python_processor
    ports:
      - "5000:5000"
    environment:
      - SERVICE_NAME=data-processor
      - OTEL_SERVICE_NAME=data-processor
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    networks:
      - tp-network

  # ── Outils Observabilité: Prometheus & Grafana ──────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - tp-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=devops2024
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - tp-network
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - tp-network
    restart: unless-stopped

  # ── NOUVEAU: Jaeger & OpenTelemetry Collector ────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: jaeger
    ports:
      - "16686:16686"   # UI Jaeger
      - "4317:4317"     # OTLP gRPC (OpenTelemetry)
      - "4318:4318"     # OTLP HTTP (OpenTelemetry)
      - "6831:6831/udp" # Jaeger compact thrift
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - tp-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.88.0
    container_name: otel-collector
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4319:4317"
      - "4320:4318"
    depends_on:
      - jaeger
    networks:
      - tp-network
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3101:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - tp-network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - tp-network

networks:
  tp-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
